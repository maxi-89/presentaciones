schema: spec-driven

context: |
  ## Backend Stack
  - Runtime: Node.js 24.x
  - Language: TypeScript (strict mode)
  - Framework: NestJS v10+
  - Build: tsc (via `nest build`)
  - Database: AWS DynamoDB (single-table design)
  - Testing: Jest + @nestjs/testing (90% coverage threshold)
  - Linting: ESLint + Prettier

  ## Frontend Stack
  - Framework: Next.js (App Router)
  - Language: TypeScript (strict mode)
  - Styling: Tailwind CSS
  - Testing: Jest + React Testing Library / Playwright for E2E

  ## Mobile Stack
  - Framework: React Native + Expo
  - Language: TypeScript (strict mode)
  - Styling: NativeWind
  - Navigation: Expo Router (file-based)
  - Testing: Jest + React Native Testing Library

  ## Architecture
  - Backend follows Domain-Driven Design (DDD) with modular NestJS architecture:
    Domain → Application (Services + DTOs) → Infrastructure (DynamoDB) → Presentation (Controllers)
  - Single-table DynamoDB design pattern
  - REST API exposed via NestJS controllers
  - Frontend uses Next.js App Router with Server and Client Components
  - Mobile uses Expo Router with file-based navigation

  ## Conventions
  - All code, docs, commits, and test names in English
  - Conventional commits (feat, fix, docs, refactor, test, chore)
  - TDD: write failing tests first
  - Small, incremental changes — one task at a time
  - Full TypeScript strict typing throughout

rules:
  proposal:
    - Keep proposals focused on one feature or concern
    - Always include a "Non-goals" section
    - Identify which stack (backend/frontend/mobile/all) is affected
  tasks:
    - Break tasks into steps of max 2 hours
    - Each task must reference affected files
    - First task is always: write failing tests
